name: Build Android Zips
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  app_id: pvr.ultimate

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Nexus (v20)
          - kodi-branch: Nexus
            host: arm-linux-androideabi
            abi: armeabi-v7a
            ndk-version: r25c
          - kodi-branch: Nexus
            host: aarch64-linux-android
            abi: arm64-v8a
            ndk-version: r25c

          # Omega (v21)
          - kodi-branch: Omega
            host: arm-linux-androideabi
            abi: armeabi-v7a
            ndk-version: r25c
          - kodi-branch: Omega
            host: aarch64-linux-android
            abi: arm64-v8a
            ndk-version: r25c

          # Piers (v22 Beta 1 Tag / Branch)
          - kodi-branch: 22.0b1-Piers
            host: arm-linux-androideabi
            abi: armeabi-v7a
            ndk-version: r26b
          - kodi-branch: 22.0b1-Piers
            host: aarch64-linux-android
            abi: arm64-v8a
            ndk-version: r26b

    steps:
      - name: Checkout Kodi Repository
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: ${{ matrix.kodi-branch }}
          path: xbmc

      - name: Checkout Add-on Repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.app_id }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rapidjson-dev flatbuffers-compiler libflatbuffers-dev \
            autoconf automake libtool pkg-config curl zip gettext \
            libcurl4-openssl-dev libssl-dev ccache ninja-build cmake

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ matrix.ndk-version }}
          add-to-path: false

      - name: Prepare Add-on Definition
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/xbmc/cmake/addons/addons/${{ env.app_id }}"
          echo "${{ env.app_id }} ${{ github.workspace }}/${{ env.app_id }}" \
            > "${{ github.workspace }}/xbmc/cmake/addons/addons/${{ env.app_id }}/${{ env.app_id }}.txt"

      - name: Configure Kodi depends
        shell: bash
        run: |
          set -ex
          export ANDROID_NDK_ROOT="${{ steps.setup-ndk.outputs.ndk-path }}"
          export ANDROID_NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          export ANDROID_HOME="${ANDROID_NDK_ROOT}"  # Add this

          cd "${{ github.workspace }}/xbmc/tools/depends"
          ./bootstrap
          ./configure \
            --host=${{ matrix.host }} \
            --with-toolchain="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64" \
            --with-ndk-path="${ANDROID_NDK_ROOT}" \
            --with-sdk-path="${ANDROID_HOME}" \
            --prefix="${{ github.workspace }}/kodi-deps" \
            --disable-debug

      - name: Build Kodi depends
        shell: bash
        run: |
          cd "${{ github.workspace }}/xbmc/tools/depends"
          make -j$(nproc)

      - name: Locate toolchain file
        id: toolchain
        shell: bash
        run: |
          set -ex
          TOOLCHAIN_FILE=$(find "${{ github.workspace }}/kodi-deps" -name "Toolchain_binaddons.cmake" -print -quit)
          if [ -z "$TOOLCHAIN_FILE" ]; then
            echo "Toolchain file not found under kodi-deps"; exit 1
          fi
          echo "path=$TOOLCHAIN_FILE" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        shell: bash
        run: |
          cmake \
            -G Ninja \
            -S "${{ github.workspace }}/xbmc/cmake/addons" \
            -B "${{ env.app_id }}/build" \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.toolchain.outputs.path }}" \
            -DADDONS_TO_BUILD=${{ env.app_id }} \
            -DADDON_SRC_PREFIX="${{ github.workspace }}" \
            -DADDONS_DEFINITION_DIR="${{ github.workspace }}/xbmc/cmake/addons/addons" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/kodi-install" \
            -DPACKAGE_ZIP=ON

      - name: Build Add-on
        run: cmake --build "${{ env.app_id }}/build" --parallel $(nproc)
        shell: bash

      - name: Package Add-on
        shell: bash
        run: |
          ADDON_XML="${{ github.workspace }}/kodi-install/${{ env.app_id }}/addon.xml"
          [ -f "$ADDON_XML" ] || { echo "missing addon.xml"; find "${{ github.workspace }}/kodi-install" -maxdepth 3; exit 1; }
          
          ADDON_VERSION=$(python3 -c "
          import xml.etree.ElementTree as ET
          print(ET.parse('$ADDON_XML').getroot().attrib['version'])")
          
          mkdir -p "${{ env.app_id }}/build/zips"
          ZIP_PATH="${{ github.workspace }}/${{ env.app_id }}/build/zips/${{ env.app_id }}-${ADDON_VERSION}-android-${{ matrix.abi }}.zip"
          
          cd "${{ github.workspace }}/kodi-install"
          zip -r "$ZIP_PATH" "${{ env.app_id }}"

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvr.ultimate-android-${{ matrix.kodi-branch }}-${{ matrix.abi }}
          path: ${{ env.app_id }}/build/zips/*.zip