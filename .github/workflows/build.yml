name: Build Multi-Platform Zips
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  app_id: pvr.ultimate

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        kodi-branch: [Nexus, Omega, master] # Kodi 20 / 21 / 22

    steps:
      - name: Checkout Kodi Repository
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: ${{ matrix.kodi-branch }}
          path: xbmc

      - name: Checkout Add-on Repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.app_id }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rapidjson-dev flatbuffers-compiler libflatbuffers-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install rapidjson flatbuffers

      - name: Prepare Add-on Definition
        # This registers your local repository with Kodi's build system
        run: |
          mkdir -p ${{ github.workspace }}/xbmc/cmake/addons/addons/${{ env.app_id }}
          echo "${{ env.app_id }} ${{ github.workspace }}/${{ env.app_id }}" > ${{ github.workspace }}/xbmc/cmake/addons/addons/${{ env.app_id }}/${{ env.app_id }}.txt
        shell: bash

      - name: Configure CMake
        run: |
          cmake \
            -S ${{ github.workspace }}/xbmc/cmake/addons \
            -B ${{ env.app_id }}/build \
            -DADDONS_TO_BUILD=${{ env.app_id }} \
            -DADDON_SRC_PREFIX=${{ github.workspace }} \
            -DADDONS_DEFINITION_DIR=${{ github.workspace }}/xbmc/cmake/addons/addons \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/kodi-install \
            -DPACKAGE_ZIP=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
        shell: bash

      - name: Build Add-on
        run: |
          cmake --build ${{ env.app_id }}/build --parallel $(getconf _NPROCESSORS_ONLN)

      - name: Package Add-on
        run: |
          ADDON_VERSION=$(grep -oP '<addon[^>]*version="\K[^"]+' \
            ${{ github.workspace }}/kodi-install/${{ env.app_id }}/addon.xml | head -1)
          echo "Packaging ${{ env.app_id }} version $ADDON_VERSION"
          mkdir -p ${{ env.app_id }}/build/zips
          cd ${{ github.workspace }}/kodi-install
          zip -r ${{ github.workspace }}/${{ env.app_id }}/build/zips/${{ env.app_id }}-${ADDON_VERSION}.zip ${{ env.app_id }}
        shell: bash

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvr.ultimate-${{ runner.os }}-${{ matrix.kodi-branch }}
          # The bootstrapper zips the output and deposits it into the build/zips directory
          path: ${{ env.app_id }}/build/zips/*.zip