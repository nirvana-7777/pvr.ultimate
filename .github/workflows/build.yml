name: Build Multi-Platform Zips
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        kodi-branch: [nexus, omega, piers] # Kodi 20 / 21 / 22

    steps:
      - name: Checkout Add-on
        uses: actions/checkout@v4
        with:
          path: pvr.ultimate

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rapidjson-dev flatbuffers-compiler libflatbuffers-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install rapidjson flatbuffers

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install rapidjson:x64-windows flatbuffers:x64-windows
        shell: bash

      - name: Clone Kodi Source
        run: git clone --depth 1 --branch ${{ matrix.kodi-branch }} https://github.com/xbmc/xbmc.git kodi-source

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: >
          cmake -S pvr.ultimate -B pvr.ultimate/build
          -DKODI_SOURCE_DIR=${{ github.workspace }}/kodi-source
          -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -S pvr.ultimate -B pvr.ultimate/build
          -DKODI_SOURCE_DIR=${{ github.workspace }}/kodi-source
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -A x64

      - name: Build Add-on
        run: cmake --build pvr.ultimate/build --config Release --parallel 4

      - name: Package Add-on
        run: |
          cd pvr.ultimate/build
          cpack -G ZIP -C Release

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvr.ultimate-${{ runner.os }}-${{ matrix.kodi-branch }}
          path: pvr.ultimate/build/*.zip