name: Build Multi-Platform Zips
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  app_id: pvr.ultimate

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            kodi-branch: Nexus
          - os: ubuntu-latest
            kodi-branch: Omega
          - os: ubuntu-latest
            kodi-branch: 22.0b1-Piers
          - os: macos-latest
            kodi-branch: Nexus
          - os: macos-latest
            kodi-branch: Omega
          - os: macos-latest
            kodi-branch: 22.0b1-Piers
          - os: windows-2022
            kodi-branch: Nexus
          - os: windows-2022
            kodi-branch: Omega
          - os: windows-2022
            kodi-branch: 22.0b1-Piers

    steps:
      - name: Checkout Kodi Repository
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: ${{ matrix.kodi-branch }}
          path: xbmc

      - name: Checkout Add-on Repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.app_id }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rapidjson-dev flatbuffers-compiler libflatbuffers-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install rapidjson flatbuffers

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install rapidjson flatbuffers --triplet x64-windows
          echo "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\tools\flatbuffers" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare Add-on Definition
        run: |
          mkdir -p "${{ github.workspace }}/xbmc/cmake/addons/addons/${{ env.app_id }}"
          echo "${{ env.app_id }} ${{ github.workspace }}/${{ env.app_id }}" > "${{ github.workspace }}/xbmc/cmake/addons/addons/${{ env.app_id }}/${{ env.app_id }}.txt"
        shell: bash

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake \
            -S "${{ github.workspace }}/xbmc/cmake/addons" \
            -B "${{ env.app_id }}/build" \
            -DADDONS_TO_BUILD=${{ env.app_id }} \
            -DADDON_SRC_PREFIX="${{ github.workspace }}" \
            -DADDONS_DEFINITION_DIR="${{ github.workspace }}/xbmc/cmake/addons/addons" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/kodi-install" \
            -DPACKAGE_ZIP=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
        shell: bash

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake \
            -S "${{ github.workspace }}/xbmc/cmake/addons" \
            -B "${{ env.app_id }}/build" \
            -G "NMake Makefiles" \
            -DADDONS_TO_BUILD=${{ env.app_id }} \
            -DADDON_SRC_PREFIX="${{ github.workspace }}" \
            -DADDONS_DEFINITION_DIR="${{ github.workspace }}/xbmc/cmake/addons/addons" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/kodi-install" \
            -DPACKAGE_ZIP=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build Add-on
        run: |
          cmake --build "${{ env.app_id }}/build" --parallel
        shell: bash

      - name: Package Add-on
        shell: bash
        run: |
          ADDON_XML="${{ github.workspace }}/kodi-install/${{ env.app_id }}/addon.xml"
          if [ ! -f "$ADDON_XML" ]; then
            echo "addon.xml not found at $ADDON_XML"
            find "${{ github.workspace }}/kodi-install" -maxdepth 3
            exit 1
          fi

          PYTHON=python3
          if [ "$RUNNER_OS" = "Windows" ]; then
            PYTHON=python
          fi

          ADDON_VERSION=$(ADDON_XML="$ADDON_XML" $PYTHON -c "
          import os, xml.etree.ElementTree as ET
          print(ET.parse(os.environ['ADDON_XML']).getroot().attrib['version'])
          ")
          if [ -z "$ADDON_VERSION" ]; then
            echo "Could not extract version from addon.xml"
            exit 1
          fi
          echo "Packaging ${{ env.app_id }} version $ADDON_VERSION"

          mkdir -p "${{ env.app_id }}/build/zips"
          ZIP_PATH="${{ github.workspace }}/${{ env.app_id }}/build/zips/${{ env.app_id }}-${ADDON_VERSION}.zip"

          cd "${{ github.workspace }}/kodi-install"
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -Command "Compress-Archive -Path '${{ env.app_id }}' -DestinationPath '$ZIP_PATH' -Force"
          else
            zip -r "$ZIP_PATH" "${{ env.app_id }}"
          fi

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvr.ultimate-${{ runner.os }}-${{ matrix.kodi-branch }}
          path: ${{ env.app_id }}/build/zips/*.zip