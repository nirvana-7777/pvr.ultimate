name: Build Multi-Platform Zips
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        kodi-branch: [Nexus, Omega, Piers] # Kodi 20 / 21 / 22

    steps:
      - name: Checkout Add-on
        uses: actions/checkout@v4
        with:
          path: pvr.ultimate

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rapidjson-dev flatbuffers-compiler libflatbuffers-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install rapidjson flatbuffers

      - name: Clone Kodi Source
        run: git clone --depth 1 --branch ${{ matrix.kodi-branch }} https://github.com/xbmc/xbmc.git kodi-source

      - name: Configure and Install Kodi Headers
        # Added -DCORE_PLATFORM_NAME=osx for macOS
        run: |
          cmake -S kodi-source -B kodi-build \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/kodi-install \
            -DCORE_PLATFORM_NAME=osx \
            -DENABLE_INTERNAL_FLATBUFFERS=ON \
            -DENABLE_INTERNAL_RAPIDJSON=ON
          cmake --install kodi-build
        shell: bash

      - name: Configure CMake
        run: >
          cmake -S pvr.ultimate -B pvr.ultimate/build
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/kodi-install
          -DCMAKE_BUILD_TYPE=Release

      - name: Build Add-on
        run: cmake --build pvr.ultimate/build --config Release --parallel 4

      - name: Package Add-on
        run: |
          cd pvr.ultimate/build
          cpack -G ZIP -C Release

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvr.ultimate-${{ runner.os }}-${{ matrix.kodi-branch }}
          path: pvr.ultimate/build/*.zip